version: '3.8'

services:
  # Database Service
  db:
    image: postgres:15-alpine
    container_name: fifa_command_db
    environment:
      POSTGRES_DB: fifa_stadium
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      # Automatically initialize database on container startup
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2_seed.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fifa_stadium"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Python FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: fifa_command_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fifa_stadium
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Required: supply a strong random secret via the environment / .env file.
      # No insecure default is provided.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost,http://localhost:80}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Nginx Frontend Static Server
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: fifa_command_frontend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  pgdata:
